description = "Audit the whole repo: what to delete, simplify, de-duplicate"
prompt = "Audit the entire repository for deletion and duplication, not correctness. Scan the whole tree, not a diff. Rank by payoff, heaviest cut first; lead with the handful that matter, cap at ~15 and summarize the rest rather than dumping every finding. One line each: <tag> <what to cut>. <replacement>. [path]. Tags: delete, stdlib, native, yagni, shrink, plus dry (same logic in 3+ places — list the copies, name one home). Don't flag generated code, vendored dirs, migrations, or test fixtures; for public API surface flag 'delete: if unused — confirm callers first', never a clean cut. Prod-killers (security, data-loss, correctness) go to /ponytail-review or a security pass. End with net lines and deps removable. If nothing to cut: 'Lean already. Ship.'"
